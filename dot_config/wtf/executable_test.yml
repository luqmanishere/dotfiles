wtf:
  colors:
    border:
      focusable: darkslateblue
      focused: orange
      normal: gray
  grid:
    columns: [40, 32, 32, 32, 90]
    rows: [20, 10, 10, 4, 4, 90]
  refreshInterval: 1
  mods:
    digitalclock:
      color: orange
      enabled: true
      font: bigfont
      hourFormat: 12
      position:
        top: 0
        left: 0
        height: 1
        width: 1
      title: "big clock"
      type: "digitalclock"
